<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vishal Bangde | BI Portfolio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI;
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

body:before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(120deg,#60a5fa33,#22d3ee33,#a855f733);
animation:bgMove 18s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CONTAINER */

.container{
width:1200px;
margin:auto;
padding:30px;
}

/* HEADER */

.header{text-align:center;margin-bottom:40px;}

.profile-row{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.profile-img{
width:90px;
height:90px;
border-radius:50%;
padding:4px;
background:linear-gradient(120deg,#60a5fa,#22d3ee,#a855f7);
animation:rotateGlow 6s linear infinite;
}

.profile-img img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid #0b0f1a;
}

@keyframes rotateGlow{
0%{filter:drop-shadow(0 0 6px #60a5fa)}
50%{filter:drop-shadow(0 0 18px #a855f7)}
100%{filter:drop-shadow(0 0 10px #22d3ee)}
}

.header h1{
font-size:44px;
margin:0;
font-weight:600;
}

.header h3{
color:#94a3b8;
}

/* CONTACT BUTTONS */

.tools span{
background:#141a2b;
border:1px solid #283056;
padding:7px 15px;
border-radius:30px;
margin:6px;
display:inline-block;
font-size:13px;
transition:.3s;
animation:buttonFloat 5s infinite ease-in-out;
}

@keyframes buttonFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-4px)}
100%{transform:translateY(0)}
}

.tools span:hover{
transform:translateY(-3px);
box-shadow:0 0 10px #3b82f6;
}

.tools a{
text-decoration:none;
color:white;
}

/* KPI CARDS */

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#141a2b;
border-radius:14px;
padding:22px;
display:flex;
align-items:center;
gap:15px;
border:1px solid #273059;
transition:all .3s;
position:relative;
overflow:hidden;
}

.card:before{
content:"";
position:absolute;
inset:0;
border-radius:14px;
padding:1px;
background:linear-gradient(120deg,#60a5fa,#22d3ee,#a855f7);
-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
mask-composite:exclude;
}

/* CARD SHINE */

.card::after{
content:"";
position:absolute;
top:-100%;
left:-100%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
transform:rotate(25deg);
transition:0.6s;
opacity:0;
}

.card:hover::after{
top:0;
left:0;
opacity:1;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 0 30px rgba(96,165,250,.4);
}

.card i{
font-size:28px;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.card h2{
margin:0;
font-size:26px;
transition:.3s;
}

.card p{
margin:0;
color:#94a3b8;
}

/* PANELS */

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-top:30px;
}

.panel{
background:#141a2b;
border-radius:14px;
padding:20px;
border:1px solid #273059;
transition:all .3s;
position:relative;
animation:panelFade 1s ease forwards;
opacity:0;
}

@keyframes panelFade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.panel:before{
content:"";
position:absolute;
inset:0;
border-radius:14px;
padding:1px;
background:linear-gradient(120deg,#60a5fa,#22d3ee,#a855f7);
opacity:0;
transition:.3s;
-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
mask-composite:exclude;
}

.panel:hover:before{opacity:1;}

.panel:hover{
transform:scale(1.02);
box-shadow:0 0 25px rgba(59,130,246,.3);
}

.panel h3{
margin-top:0;
letter-spacing:.5px;
}

/* LIST */

.list{
list-style:none;
padding:0;
}

.list li{
padding:10px 0;
border-bottom:1px solid #273059;
display:flex;
align-items:center;
gap:10px;
transition:.3s;
}

.list li:hover{
color:#60a5fa;
transform:translateX(6px);
}

.list li i{
transition:0.3s;
}

.list li:hover i{
transform:scale(1.3) rotate(8deg);
color:#60a5fa;
}

/* CHART */

.chart-box{
height:260px;
display:flex;
align-items:center;
justify-content:center;
}

/* TECH STACK */

.tech{
text-align:center;
margin-top:40px;
}

.tech span{
display:inline-block;
background:#141a2b;
padding:10px 18px;
border-radius:30px;
margin:6px;
border:1px solid #273059;
animation:float 6s infinite ease-in-out;
}

.tech span:hover{
transform:translateY(-3px);
box-shadow:0 0 10px #3b82f6;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* RESPONSIVE */

@media(max-width:1100px){
.container{width:90%}
.kpi-grid{grid-template-columns:1fr 1fr}
.grid{grid-template-columns:1fr}
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="profile-row">

<div class="profile-img">
<img src="profile.jpeg">
</div>

<div>
<h1><i class="fa-solid fa-chart-line"></i> Vishal Bangde</h1>
<h3>Power BI Developer | Data Analyst</h3>
</div>

</div>

<div class="tools">

<a href="tel:+917020292767"><span><i class="fa-solid fa-phone"></i> Call</span></a> <a href="https://wa.me/917020292767"><span><i class="fa-brands fa-whatsapp"></i> WhatsApp</span></a> <a href="https://linkedin.com/in/vishal-bangde-66268a2a4"><span><i class="fa-brands fa-linkedin"></i> LinkedIn</span></a> <a href="Vishal_Bangde_Resume.pdf" download><span><i class="fa-solid fa-download"></i> Resume</span></a>

</div>

</div>

<!-- KPI -->

<div class="kpi-grid">

<div class="card">
<i class="fa-solid fa-briefcase" style="color:#fbbf24"></i>
<div>
<h2 class="counter" data-target="8">0</h2>
<p>Years Experience</p>
</div>
</div>

<div class="card">
<i class="fa-solid fa-chart-simple" style="color:#60a5fa"></i>
<div>
<h2 class="counter" data-target="70">0</h2>
<p>Dashboards Delivered</p>
</div>
</div>

<div class="card">
<i class="fa-solid fa-circle-check" style="color:#22c55e"></i>
<div>
<h2 class="counter" data-target="20">0</h2>
<p>Executive level Reports</p>
</div>
</div>

<div class="card">
<i class="fa-solid fa-bullseye" style="color:#38bdf8"></i>
<div>
<h2 class="counter" data-target="15">0</h2>
<p>Technologies Mastered</p>
</div>
</div>

</div>

<!-- (Your remaining sections stay exactly the same) -->

</div>

<script>

/* KPI COUNTER */

const counters=document.querySelectorAll('.counter');

counters.forEach(counter=>{
const update=()=>{
const target=+counter.getAttribute('data-target');
const c=+counter.innerText;
const inc=target/80;

if(c<target){
counter.innerText=Math.ceil(c+inc);
setTimeout(update,20);
}else{
counter.innerText=target+"+";
}
};
update();
});

</script>

</body>
</html>
