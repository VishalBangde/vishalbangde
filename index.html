<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI;
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* ANIMATED BACKGROUND */

body:before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(120deg,#60a5fa33,#22d3ee33,#a855f733);
animation:bgMove 15s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CONTAINER */

.container{
width:1200px;
margin:auto;
padding:30px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:44px;
margin:0;
font-weight:600;
letter-spacing:1px;
background:linear-gradient(90deg,#60a5fa,#22d3ee,#a855f7);
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{filter:hue-rotate(0)}
100%{filter:hue-rotate(360deg)}
}

.header h3{
color:#94a3b8;
}

/* PROFILE */

.profile-row{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.profile-img{
width:90px;
height:90px;
border-radius:50%;
padding:4px;
background:linear-gradient(120deg,#60a5fa,#22d3ee,#a855f7);
animation:profileGlow 6s linear infinite;
}

.profile-img img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid #0b0f1a;
}

@keyframes profileGlow{
0%{box-shadow:0 0 10px #60a5fa}
50%{box-shadow:0 0 20px #a855f7}
100%{box-shadow:0 0 10px #22d3ee}
}

/* CONTACT BUTTONS */

.tools span{
background:#141a2b;
border:1px solid #283056;
padding:7px 15px;
border-radius:30px;
margin:6px;
display:inline-block;
font-size:13px;
transition:.3s;
}

.tools span:hover{
transform:translateY(-4px);
box-shadow:0 0 12px #3b82f6;
background:#1a2135;
}

.tools a{
text-decoration:none;
color:white;
}

/* KPI CARDS */

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#141a2b;
border-radius:14px;
padding:22px;
display:flex;
align-items:center;
gap:15px;
border:1px solid #273059;
transition:.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 0 25px rgba(96,165,250,.35);
}

.card i{
font-size:28px;
animation:iconFloat 4s ease-in-out infinite;
}

@keyframes iconFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

.card h2{
margin:0;
font-size:26px;
}

.card p{
margin:0;
color:#94a3b8;
}

/* PANELS */

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-top:30px;
}

.panel{
background:#141a2b;
border-radius:14px;
padding:20px;
border:1px solid #273059;
transition:.3s;
}

.panel:hover{
transform:scale(1.02);
box-shadow:0 0 20px rgba(59,130,246,.3);
}

.panel h3{
margin-top:0;
}

/* LIST */

.list{
list-style:none;
padding:0;
}

.list li{
padding:10px 0;
border-bottom:1px solid #273059;
display:flex;
align-items:center;
gap:10px;
transition:.3s;
}

.list li:hover{
color:#60a5fa;
transform:translateX(6px);
}

/* CHART */

.chart-box{
height:260px;
display:flex;
align-items:center;
justify-content:center;
}

/* CAREER */

.career-container{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
}

.career-legend{
display:flex;
flex-direction:column;
gap:16px;
font-size:15px;
}

.legend-item{
display:flex;
align-items:center;
gap:10px;
}

.legend-color{
width:16px;
height:16px;
border-radius:4px;
}

/* TECH STACK */

.tech{
text-align:center;
margin-top:40px;
}

.tech span{
display:inline-block;
background:#141a2b;
padding:10px 18px;
border-radius:30px;
margin:6px;
border:1px solid #273059;
transition:.3s;
animation:float 5s infinite ease-in-out;
}

.tech span:hover{
transform:translateY(-4px);
box-shadow:0 0 12px #3b82f6;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* RESPONSIVE */

@media(max-width:1100px){

.container{width:90%}

.kpi-grid{
grid-template-columns:1fr 1fr
}

.grid{
grid-template-columns:1fr
}

}

</style>
</head>
